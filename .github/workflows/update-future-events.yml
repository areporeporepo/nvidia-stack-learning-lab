name: Update Future Events

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run future event updater
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NIM_BASE_URL: ${{ secrets.NIM_BASE_URL }}
          NIM_MODEL: ${{ secrets.NIM_MODEL }}
        run: |
          python scripts/update_future_events.py \
            --base-url "${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}" \
            --model "${NIM_MODEL:-nvidia/nemotron-3-super-120b-a12b}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-future-events
          commit-message: "Update future event snapshot"
          title: "Update future event snapshot"
          body: |
            Automated update generated by the Nemotron-backed future event workflow.

            - Fetched official source pages
            - Wrote dated markdown updates under `events/*/updates/`
            - Regenerated `docs/future-events-generated.md`
            - Regenerated `data/future_event_snapshot.json`
          delete-branch: true
